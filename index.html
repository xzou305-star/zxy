<!DOCTYPE html><html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工业安全生产实时监控系统 - 摄像头版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
        }

        .status-light.active {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .video-section {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        #video {
            width: 100%;
            display: block;
            background: #000;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-placeholder {
            width: 100%;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            flex-direction: column;
            gap: 20px;
        }

        .video-placeholder .icon {
            font-size: 80px;
            opacity: 0.5;
        }

        .video-placeholder .text {
            font-size: 18px;
            opacity: 0.7;
        }

        .controls {
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            background: rgba(255,255,255,0.05);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: #4CAF50;
            color: white;
        }

        .btn-stop {
            background: #f44336;
            color: white;
        }

        .btn-simulate {
            background: #FF9800;
            color: white;
        }

        .btn-snapshot {
            background: #2196F3;
            color: white;
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .alerts-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .alert-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            gap: 10px;
        }

        .alert-danger {
            border-left: 4px solid #f44336;
            background: rgba(244,67,54,0.1);
        }

        .alert-warning {
            border-left: 4px solid #FF9800;
            background: rgba(255,152,0,0.1);
        }

        .alert-info {
            border-left: 4px solid #2196F3;
            background: rgba(33,150,243,0.1);
        }

        .alert-success {
            border-left: 4px solid #4CAF50;
            background: rgba(76,175,80,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-content button {
            margin-top: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>🏭</span>
                工业安全生产实时监控系统
            </h1>
            <div class="status">
                <div class="status-light" id="statusLight"></div>
                <span id="statusText">系统就绪</span>
                <span style="margin-left: 20px;" id="clock"></span>
            </div>
        </div>

        <div class="main-content">
            <div class="video-section">
                <div class="video-wrapper">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <div class="icon">📹</div>
                        <div class="text">摄像头未启动</div>
                        <div style="font-size: 14px; opacity: 0.5;">点击"启动摄像头"开始监控</div>
                    </div>
                    <video id="video" style="display: none;" autoplay playsinline muted></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                </div>
                <div class="controls">
                    <button class="btn-start" id="btnStart" onclick="startCamera()">
                        ▶️ 启动摄像头
                    </button>
                    <button class="btn-stop" id="btnStop" onclick="stopCamera()" disabled>
                        ⏹️ 停止
                    </button>
                    <button class="btn-simulate" onclick="startSimulation()">
                        🎮 模拟模式
                    </button>
                    <button class="btn-snapshot" id="btnSnapshot" onclick="takeSnapshot()" disabled>
                        📸 截图
                    </button>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-card">
                    <div style="font-size: 40px;">🛡️</div>
                    <div class="stat-value" id="safetyScore" style="color: #4CAF50;">100</div>
                    <div class="stat-label">安全评分</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 40px;">👷</div>
                    <div class="stat-value" id="workerCount">0</div>
                    <div class="stat-label">检测到工人</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 40px;">⛑️</div>
                    <div class="stat-value" id="helmetViolations" style="color: #FF9800;">0</div>
                    <div class="stat-label">安全帽违规</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 40px;">⚠️</div>
                    <div class="stat-value" id="zoneViolations" style="color: #f44336;">0</div>
                    <div class="stat-label">危险区域违规</div>
                </div>
            </div>
        </div>

        <div class="alerts-section" style="margin-top: 20px;">
            <h2 style="margin-bottom: 15px;">📋 实时报警记录</h2>
            <div class="alert-list" id="alertList">
                <div class="alert-item alert-info">
                    <span>ℹ️</span>
                    <div>
                        <div>系统就绪</div>
                        <div style="font-size: 12px; opacity: 0.7;">等待启动摄像头或模拟模式</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="alertModal">
        <div class="modal-content">
            <div style="font-size: 60px; margin-bottom: 20px;" id="modalIcon">🚨</div>
            <h2 id="modalTitle">安全警告</h2>
            <p id="modalMessage">检测到安全隐患</p>
            <button onclick="closeModal()" style="background: #f44336; color: white;">
                确认
            </button>
        </div>
    </div>

    <script>
        // 全局变量
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let stream = null;
        let isMonitoring = false;
        let isSimulation = false;
        let animationId = null;
        
        // 统计数据
        let stats = {
            safetyScore: 100,
            workerCount: 0,
            helmetViolations: 0,
            zoneViolations: 0
        };

        // 模拟工人数据
        let workers = [];

        // 危险区域
        const dangerZones = [
            { x: 0.1, y: 0.1, w: 0.2, h: 0.2, name: '高空作业区' },
            { x: 0.6, y: 0.6, w: 0.3, h: 0.3, name: '重型机械区' }
        ];

        // 初始化
        window.onload = function() {
            updateClock();
            setInterval(updateClock, 1000);
            initWorkers();
            console.log('系统初始化完成');
        };

        // 更新时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleString('zh-CN');
        }

        // 初始化模拟工人
        function initWorkers() {
            workers = [
                { id: 1, x: 0.3, y: 0.4, vx: 0.003, vy: 0.002, helmet: true, color: '黄色' },
                { id: 2, x: 0.5, y: 0.5, vx: -0.002, vy: 0.003, helmet: Math.random() > 0.3, color: '白色' },
                { id: 3, x: 0.7, y: 0.6, vx: 0.001, vy: -0.002, helmet: Math.random() > 0.3, color: '蓝色' }
            ];
        }

        // 启动摄像头
        async function startCamera() {
            try {
                console.log('正在请求摄像头权限...');
                
                // 检查浏览器支持
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('您的浏览器不支持摄像头访问，请使用Chrome、Edge或Firefox');
                }

                // 请求摄像头
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'environment'
                    },
                    audio: false
                });

                console.log('摄像头权限已获取');
                
                // 设置视频源
                video.srcObject = stream;
                
                // 等待视频加载
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        console.log('视频元数据加载完成');
                        resolve();
                    };
                });

                // 播放视频
                await video.play();
                console.log('视频开始播放');

                // 设置canvas大小
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;

                // 显示视频，隐藏占位符
                document.getElementById('videoPlaceholder').style.display = 'none';
                video.style.display = 'block';
                canvas.style.display = 'block';

                // 更新UI
                isMonitoring = true;
                isSimulation = false;
                updateUIState(true);
                updateStatus('active', '摄像头监控中');

                // 添加日志
                addAlert('success', '✅ 摄像头启动成功', '实时监控已开始');

                // 开始处理帧
                processCameraFrame();

            } catch (error) {
                console.error('摄像头启动失败:', error);
                
                let errorMessage = '摄像头启动失败';
                if (error.name === 'NotAllowedError') {
                    errorMessage = '摄像头权限被拒绝，请在浏览器设置中允许访问摄像头';
                } else if (error.name === 'NotFoundError') {
                    errorMessage = '未找到摄像头设备，请检查摄像头连接';
                } else if (error.name === 'NotReadableError') {
                    errorMessage = '摄像头被其他应用占用，请关闭其他使用摄像头的程序';
                }
                
                addAlert('danger', '❌ ' + errorMessage, error.message);
                showModal('摄像头错误', errorMessage);
                
                // 建议使用模拟模式
                setTimeout(() => {
                    if (confirm('摄像头无法使用，是否切换到模拟模式？')) {
                        startSimulation();
                    }
                }, 1000);
            }
        }

        // 停止摄像头
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            video.srcObject = null;
            video.style.display = 'none';
            canvas.style.display = 'none';
            document.getElementById('videoPlaceholder').style.display = 'flex';
            
            isMonitoring = false;
            isSimulation = false;
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateUIState(false);
            updateStatus('', '摄像头已停止');
            addAlert('warning', '⏹️ 监控已停止', '系统暂停运行');
        }

        // 处理摄像头帧
        function processCameraFrame() {
            if (!isMonitoring || isSimulation) return;

            try {
                // 将视频帧绘制到canvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 获取图像数据进行分析
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // 进行安全检测（这里是简化版，实际应使用AI模型）
                performSafetyDetection(imageData);
                
                // 绘制检测覆盖层
                drawDetectionOverlay();
                
                // 更新统计
                updateStats();
                
            } catch (error) {
                console.error('帧处理错误:', error);
            }

            // 继续处理下一帧
            animationId = requestAnimationFrame(processCameraFrame);
        }

        // 安全检测（简化版）
        function performSafetyDetection(imageData) {
            // 这里使用简单的颜色分析来模拟安全帽检测
            // 实际应用中应该使用TensorFlow.js等AI模型
            
            const data = imageData.data;
            let yellowPixels = 0;
            let whitePixels = 0;
            let totalPixels = data.length / 4;
            
            // 扫描图像寻找安全帽颜色
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // 检测黄色（安全帽常见颜色）
                if (r > 200 && g > 180 && b < 100) {
                    yellowPixels++;
                }
                
                // 检测白色（安全帽常见颜色）
                if (r > 200 && g > 200 && b > 200) {
                    whitePixels++;
                }
            }
            
            // 根据颜色比例估算
            const helmetRatio = (yellowPixels + whitePixels) / totalPixels;
            
            // 模拟检测结果
            stats.workerCount = Math.max(0, Math.floor(Math.random() * 3) + 1);
            stats.helmetViolations = helmetRatio > 0.01 ? 0 : Math.floor(Math.random() * 2);
            stats.zoneViolations = Math.random() > 0.8 ? 1 : 0;
        }

        // 绘制检测覆盖层
        function drawDetectionOverlay() {
            // 绘制危险区域
            dangerZones.forEach(zone => {
                const x = zone.x * canvas.width;
                const y = zone.y * canvas.height;
                const w = zone.w * canvas.width;
                const h = zone.h * canvas.height;
                
                // 半透明填充
                ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                ctx.fillRect(x, y, w, h);
                
                // 边框
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.setLineDash([]);
                
                // 标签
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(`⚠ ${zone.name}`, x + 5, y - 5);
            });
            
            // 绘制模拟检测框
            for (let i = 0; i < stats.workerCount; i++) {
                const x = 200 + i * 250;
                const y = 300 + Math.sin(Date.now() / 1000 + i) * 50;
                const hasHelmet = i < stats.workerCount - stats.helmetViolations;
                
                // 检测框
                ctx.strokeStyle = hasHelmet ? '#4CAF50' : '#f44336';
                ctx.lineWidth = 2;
                ctx.strokeRect(x - 40, y - 60, 80, 120);
                
                // 状态
                ctx.fillStyle = hasHelmet ? '#4CAF50' : '#f44336';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(hasHelmet ? '✓ 安全帽' : '✗ 未佩戴', x - 40, y - 70);
            }
        }

        // 模拟模式
        function startSimulation() {
            // 停止摄像头
            if (stream) {
                stopCamera();
            }
            
            // 设置模拟模式
            isMonitoring = true;
            isSimulation = true;
            
            // 设置canvas
            canvas.width = 800;
            canvas.height = 600;
            canvas.style.display = 'block';
            video.style.display = 'none';
            document.getElementById('videoPlaceholder').style.display = 'none';
            
            updateUIState(true);
            updateStatus('active', '模拟监控模式');
            addAlert('info', '🎮 进入模拟模式', '使用虚拟数据进行演示');
            
            // 开始模拟
            processSimulationFrame();
        }

        // 处理模拟帧
        function processSimulationFrame() {
            if (!isMonitoring || !isSimulation) return;

            // 更新工人位置
            workers.forEach(worker => {
                worker.x += worker.vx;
                worker.y += worker.vy;
                
                if (worker.x < 0.05 || worker.x > 0.95) worker.vx *= -1;
                if (worker.y < 0.1 || worker.y > 0.9) worker.vy *= -1;
                
                if (Math.random() < 0.01) {
                    worker.helmet = !worker.helmet;
                    if (!worker.helmet) {
                        addAlert('danger', `🚨 工人 #${worker.id} 未佩戴安全帽！`, '安全帽违规');
                    }
                }
            });

            // 清空canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawSimulationBackground();
            
            // 绘制危险区域
            dangerZones.forEach(zone => {
                const x = zone.x * canvas.width;
                const y = zone.y * canvas.height;
                const w = zone.w * canvas.width;
                const h = zone.h * canvas.height;
                
                ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 5]);
                ctx.strokeRect(x, y, w, h);
                ctx.setLineDash([]);
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(`⚠ ${zone.name}`, x + 5, y - 5);
            });
            
            // 绘制工人
            let helmetViolations = 0;
            let zoneViolations = 0;
            
            workers.forEach(worker => {
                const x = worker.x * canvas.width;
                const y = worker.y * canvas.height;
                
                // 身体
                ctx.fillStyle = '#556';
                ctx.fillRect(x - 15, y - 10, 30, 60);
                
                // 头部
                ctx.beginPath();
                ctx.arc(x, y - 25, 18, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                
                if (worker.helmet) {
                    // 安全帽
                    ctx.fillStyle = worker.color === '黄色' ? '#FFD700' : 
                                   worker.color === '白色' ? '#FFF' : '#4169E1';
                    ctx.beginPath();
                    ctx.arc(x, y - 30, 22, Math.PI, 0);
                    ctx.fill();
                    ctx.fillRect(x - 22, y - 30, 44, 8);
                } else {
                    helmetViolations++;
                }
                
                // 状态标记
                ctx.fillStyle = worker.helmet ? '#4CAF50' : '#f44336';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(worker.helmet ? '✓' : '✗', x - 5, y - 35);
                
                // ID
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.fillText(`#${worker.id}`, x - 10, y + 65);
                
                // 检查危险区域
                dangerZones.forEach(zone => {
                    const zx = zone.x * canvas.width;
                    const zy = zone.y * canvas.height;
                    const zw = zone.w * canvas.width;
                    const zh = zone.h * canvas.height;
                    
                    if (x > zx && x < zx + zw && y > zy && y < zy + zh) {
                        zoneViolations++;
                        ctx.fillStyle = '#ff6600';
                        ctx.font = 'bold 12px Arial';
                        ctx.fillText('⚠ DANGER', x - 25, y - 45);
                    }
                });
            });
            
            // 更新统计
            stats.workerCount = workers.length;
            stats.helmetViolations = helmetViolations;
            stats.zoneViolations = zoneViolations;
            
            // 计算安全评分
            if (stats.workerCount > 0) {
                stats.safetyScore = Math.max(0, 100 - 
                    (stats.helmetViolations / stats.workerCount) * 40 -
                    (stats.zoneViolations / stats.workerCount) * 30);
            } else {
                stats.safetyScore = 100;
            }
            
            // 绘制信息面板
            drawInfoPanel();
            
            // 更新显示
            updateStats();
            
            // 继续动画
            animationId = requestAnimationFrame(processSimulationFrame);
        }

        // 绘制模拟背景
        function drawSimulationBackground() {
            // 天空
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#B0C4DE');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);
            
            // 建筑
            ctx.fillStyle = '#708090';
            ctx.fillRect(50, 100, 200, canvas.height * 0.5 - 100);
            ctx.fillRect(canvas.width - 250, 80, 200, canvas.height * 0.5 - 80);
            
            // 窗户
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = '#ADD8E6';
                ctx.fillRect(80 + i * 60, 130, 40, 40);
                ctx.fillRect(canvas.width - 220 + i * 60, 110, 40, 40);
            }
            
            // 地面
            ctx.fillStyle = '#808080';
            ctx.fillRect(0, canvas.height * 0.5, canvas.width, canvas.height * 0.5);
            
            // 网格线
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height * 0.5);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
        }

        // 绘制信息面板
        function drawInfoPanel() {
            const panelX = canvas.width - 220;
            const panelY = 10;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(panelX, panelY, 210, 150);
            
            ctx.fillStyle = '#0ff';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('📊 实时统计', panelX + 10, panelY + 25);
            
            ctx.strokeStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(panelX + 10, panelY + 35);
            ctx.lineTo(panelX + 200, panelY + 35);
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            const infoLines = [
                `工人数: ${stats.workerCount}`,
                `安全帽违规: ${stats.helmetViolations}`,
                `区域违规: ${stats.zoneViolations}`,
                `安全评分: ${stats.safetyScore.toFixed(0)}%`,
                `时间: ${new Date().toLocaleTimeString()}`
            ];
            
            infoLines.forEach((line, i) => {
                ctx.fillText(line, panelX + 10, panelY + 55 + i * 20);
            });
        }

        // 更新统计显示
        function updateStats() {
            document.getElementById('safetyScore').textContent = Math.round(stats.safetyScore);
            document.getElementById('workerCount').textContent = stats.workerCount;
            document.getElementById('helmetViolations').textContent = stats.helmetViolations;
            document.getElementById('zoneViolations').textContent = stats.zoneViolations;
            
            // 更新安全评分颜色
            const scoreElement = document.getElementById('safetyScore');
            if (stats.safetyScore >= 80) {
                scoreElement.style.color = '#4CAF50';
            } else if (stats.safetyScore >= 60) {
                scoreElement.style.color = '#FF9800';
            } else {
                scoreElement.style.color = '#f44336';
            }
        }

        // 更新UI状态
        function updateUIState(active) {
            document.getElementById('btnStart').disabled = active;
            document.getElementById('btnStop').disabled = !active;
            document.getElementById('btnSnapshot').disabled = !active;
        }

        // 更新状态指示器
        function updateStatus(className, text) {
            const light = document.getElementById('statusLight');
            light.className = 'status-light';
            if (className) light.classList.add(className);
            document.getElementById('statusText').textContent = text;
        }

        // 添加警报
        function addAlert(type, message, detail) {
            const alertList = document.getElementById('alertList');
            const alertItem = document.createElement('div');
            alertItem.className = `alert-item alert-${type}`;
            
            const iconMap = {
                'danger': '🚨',
                'warning': '⚠️',
                'info': 'ℹ️',
                'success': '✅'
            };
            
            alertItem.innerHTML = `
                <span style="font-size: 20px;">${iconMap[type] || '📢'}</span>
                <div style="flex: 1;">
                    <div style="font-weight: bold;">${message}</div>
                    <div style="font-size: 12px; opacity: 0.7;">${detail} - ${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            
            alertList.insertBefore(alertItem, alertList.firstChild);
            
            // 限制警报数量
            while (alertList.children.length > 20) {
                alertList.removeChild(alertList.lastChild);
            }
        }

        // 截图功能
        function takeSnapshot() {
            const link = document.createElement('a');
            link.download = `safety-snapshot-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            addAlert('info', '📸 截图已保存', '快照已下载');
        }

        // 显示弹窗
        function showModal(title, message) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('alertModal').classList.add('show');
            
            setTimeout(() => {
                closeModal();
            }, 5000);
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('alertModal').classList.remove('show');
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            switch(e.key.toLowerCase()) {
                case 's':
                    if (!isMonitoring) startCamera();
                    break;
                case 'x':
                    if (isMonitoring) stopCamera();
                    break;
                case 'm':
                    if (!isMonitoring) startSimulation();
                    break;
                case 'p':
                    if (isMonitoring) takeSnapshot();
                    break;
            }
        });

        console.log('✅ 工业安全生产监控系统已就绪');
        console.log('快捷键: S-启动摄像头, X-停止, M-模拟模式, P-截图');
    </script>
</body>
</html>
